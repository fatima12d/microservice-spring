spring:
  application:
    name: book-service
  datasource:
    url: jdbc:h2:mem:bookdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    h2:
      console:
        enabled: true
        path: /h2-console
    sql:
      init:
        mode: always
server:
  port: 8081

springdoc:
  swagger-ui:
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}
