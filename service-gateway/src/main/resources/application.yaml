spring:
  application:
    name: service-gateway

  cloud:
    gateway:
      # Decouverte automatique des services Eureka
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # Routes explicites
      routes:
        - id: book-service
          uri: lb://BOOK-SERVICE
          predicates:
            - Path=/api/books/**

        - id: member-service
          uri: lb://MEMBER-SERVICE
          predicates:
            - Path=/api/members/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${random.uuid}
    lease-renewal-interval-in-seconds: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
