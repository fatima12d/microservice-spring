spring:
  application:
    name: service-dicovery

server:
  port: 8761

eureka:
  client:
    register-with-eureka: false   # ne s'enregistre pas lui-meme
    fetch-registry: false         # ne recupere pas de registre externe
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000
